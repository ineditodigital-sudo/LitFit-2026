<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LITFIT – Nuevo Mensaje</title>
</head>
<body style="margin:0; padding:0; background:#0D0D0D; font-family:-apple-system, BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <div style="width:100%; height:6px; background:#00AAC7;"></div>
  <table width="100%" role="presentation" style="padding:35px 0; background:#0D0D0D;">
    <tr>
      <td align="center">
        <table width="100%" role="presentation" style="max-width:600px; background:#151515; border-radius:18px; padding:32px; box-shadow:0 0 25px rgba(0,170,199,0.20); border:1px solid rgba(0,170,199,0.15);">
          <tr><td align="center" style="padding-bottom:25px;"><img src="cid:logo_litfit" alt="LITFIT México" width="160" style="display:block; border:0;" /></td></tr>
          <tr><td><h2 style="color:#FFFFFF; font-size:26px; margin:0 0 8px; text-align:center; font-weight:800; letter-spacing:0.5px;">Nuevo mensaje de contacto</h2><p style="color:#9A9A9A; font-size:14px; text-align:center; margin:0 0 25px; font-weight:500;">Alguien te ha escrito desde el formulario del sitio LITFIT.</p></td></tr>
          <tr><td style="padding-bottom:25px;"><div style="height:2px; width:100%; background:linear-gradient(to right, transparent, #00AAC7, transparent);"></div></td></tr>
          <tr><td><table width="100%" role="presentation" style="background:#0F0F0F; padding:20px; border-radius:12px; border:1px solid #222;">
                <tr><td style="color:#EAEAEA; padding-bottom:12px; border-bottom:1px solid #222; font-size:14px;"><strong style="color:#00AAC7; font-weight:700;">Nombre:</strong> {{from_name}}</td></tr>
                <tr><td style="color:#EAEAEA; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><strong style="color:#00AAC7; font-weight:700;">Email:</strong> {{email}}</td></tr>
                <tr><td style="color:#EAEAEA; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><strong style="color:#00AAC7; font-weight:700;">Teléfono:</strong> {{phone}}</td></tr>
                <tr><td style="color:#EAEAEA; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><strong style="color:#00AAC7; font-weight:700;">Ciudad, Estado:</strong> {{city}}</td></tr>
                <tr><td style="color:#EAEAEA; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><strong style="color:#00AAC7; font-weight:700;">Empresa/Negocio:</strong> {{business}}</td></tr>
                <tr><td style="color:#EAEAEA; padding-top:12px; font-size:14px; line-height:1.6;"><strong style="color:#00AAC7; font-weight:700;">Mensaje:</strong><br><br>{{message}}</td></tr>
          </table></td></tr>
          <tr><td style="padding-top:30px;"><p style="margin:0; text-align:center; font-size:12px; color:#777;">© LITFIT – Mensaje enviado automáticamente desde tu sitio web.</p></td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
