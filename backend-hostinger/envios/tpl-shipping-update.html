<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LITFIT – Pedido Enviado</title>
</head>
<body style="margin:0; padding:0; background:#0D0D0D; font-family:-apple-system, BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <div style="width:100%; height:8px; background:#00AAC7;"></div>
  <table width="100%" role="presentation" style="padding:40px 0; background:#0D0D0D;">
    <tr>
      <td align="center">
        <table width="100%" role="presentation" style="max-width:650px; background:#151515; border-radius:24px; padding:40px; box-shadow:0 0 40px rgba(0,170,199,0.30); border:1px solid rgba(0,170,199,0.20);">
          <tr><td align="center" style="padding-bottom:30px;"><img src="cid:logo_litfit" alt="LITFIT México" width="160" style="display:block; border:0;" /></td></tr>
          <tr><td align="center" style="padding-bottom:15px;"><div style="font-size:48px; line-height:1;">🚚</div></td></tr>
          <tr><td><h1 style="color:#FFFFFF; font-size:32px; margin:0 0 12px; text-align:center; font-weight:900; letter-spacing:-0.5px; text-transform: uppercase;">¡Tu pedido ha sido enviado!</h1><p style="color:#00AAC7; font-size:16px; text-align:center; margin:0 0 30px; font-weight:700; text-transform:uppercase; letter-spacing:1px;">Hola {{customer_name}}, tu pedido #{{order_id}} ya va en camino.</p></td></tr>
          <tr><td><div style="height:2px; width:100%; background:linear-gradient(to right, transparent, #00AAC7, transparent); margin-bottom:35px;"></div></td></tr>
          <tr><td align="center" style="padding-bottom:35px;"><div style="background:#111; padding:25px 40px; border-radius:16px; border:1px solid #222; text-align:center;"><p style="color:#888; font-size:12px; margin:0 0 10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;">Número de Rastreo</p><p style="color:#FFFFFF; font-size:28px; margin:0 0 20px; font-weight:900; letter-spacing:1px;">{{tracking_number}}</p><p style="color:#888; font-size:12px; margin:0; line-height:1.6; font-weight:600;">Paquetería: {{carrier}}</p></div></td></tr>
          <tr><td style="padding-top:40px; text-align:center;"><a href="{{tracking_url}}" style="display:inline-block; background:#00AAC7; color:#000000; padding:18px 40px; border-radius:12px; text-decoration:none; font-weight:900; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Rastrear mi paquete</a></td></tr>
          <tr><td style="padding-top:45px; text-align:center;"><p style="margin:0; font-size:10px; color:#444; line-height:1.6; font-weight:500; text-transform:uppercase; letter-spacing:0.5px;">© 2026 LITFIT México – Elite Performance Nutrition</p></td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
