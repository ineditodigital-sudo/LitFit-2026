<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - enviosinternacionales.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00AAC7 0%, #0088a3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: #00AAC7;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 900;
        }
        
        .content {
            padding: 30px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: #00AAC7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin: 10px 0;
        }
        
        .btn:hover {
            background: #0088a3;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .log {
            padding: 8px;
            margin: 4px 0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .log-info { background: #d1ecf1; color: #0c5460; }
        .log-success { background: #d4edda; color: #155724; }
        .log-error { background: #f8d7da; color: #721c24; }
        .log-warning { background: #fff3cd; color: #856404; }
        
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Test API de Envíos</h1>
            <p>Prueba tu conexión con enviosinternacionales.com</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label>Código Postal Destino:</label>
                <input type="text" id="zipCode" value="06600" placeholder="06600">
            </div>
            
            <div class="input-group">
                <label>Ciudad:</label>
                <input type="text" id="city" value="CDMX" placeholder="CDMX">
            </div>
            
            <div class="input-group">
                <label>Estado:</label>
                <input type="text" id="state" value="Ciudad de México" placeholder="Ciudad de México">
            </div>
            
            <button class="btn" onclick="testBackend()">🚀 Probar Backend PHP</button>
            
            <div id="results" class="results"></div>
        </div>
    </div>
    
    <script>
        function addLog(message, type = 'info') {
            const results = document.getElementById('results');
            results.classList.add('show');
            const log = document.createElement('div');
            log.className = `log log-${type}`;
            log.textContent = message;
            results.appendChild(log);
            results.scrollTop = results.scrollHeight;
        }
        
        function addPre(content, title = null) {
            const results = document.getElementById('results');
            if (title) {
                addLog(title, 'info');
            }
            const pre = document.createElement('pre');
            pre.textContent = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
            results.appendChild(pre);
        }
        
        async function testBackend() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            results.classList.add('show');
            
            const zipCode = document.getElementById('zipCode').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            
            addLog('🚀 Iniciando test del backend PHP...', 'info');
            addLog('📍 Código Postal: ' + zipCode, 'info');
            
            const requestBody = {
                destination: {
                    zipCode: zipCode,
                    city: city,
                    state: state,
                    country: 'México'
                },
                weight: 1.5,
                dimensions: {
                    length: 30,
                    width: 20,
                    height: 10
                }
            };
            
            addPre(requestBody, '📤 Enviando a cotizar.php:');
            
            try {
                const startTime = Date.now();
                
                const response = await fetch('https://inedito.digital/api/envios/cotizar.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const duration = Date.now() - startTime;
                
                addLog(`⏱️ Tiempo de respuesta: ${duration}ms`, 'info');
                addLog(`📥 HTTP Status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                
                addPre(data, '📥 Respuesta del backend:');
                
                if (data.success && data.options) {
                    addLog(`✅ ¡ÉXITO! ${data.options.length} opciones de envío encontradas`, 'success');
                    addLog('', 'info');
                    data.options.forEach((opt, i) => {
                        addLog(`${i+1}. ${opt.carrier} - ${opt.service} - $${opt.price} - ${opt.deliveryDays}`, 'success');
                    });
                } else if (!data.success) {
                    addLog('❌ Error: ' + data.message, 'error');
                    
                    if (data.httpCode === 401) {
                        addLog('', 'info');
                        addLog('🔐 ERROR 401: Problema de autenticación', 'error');
                        addLog('Posibles causas:', 'warning');
                        addLog('1. Las credenciales API Key/Secret son incorrectas', 'warning');
                        addLog('2. El formato de autenticación no es el correcto', 'warning');
                        addLog('3. La cuenta no tiene permisos activos', 'warning');
                        addLog('', 'info');
                        addLog('💡 Solución:', 'info');
                        addLog('Contacta a soporte@enviosinternacionales.com', 'info');
                        addLog('Comparte tus credenciales y pregunta:', 'info');
                        addLog('- ¿Son correctas estas credenciales?', 'info');
                        addLog('- ¿El endpoint /api/v1/quotations es correcto?', 'info');
                        addLog('- ¿Mi cuenta está activa y con permisos?', 'info');
                    } else if (data.httpCode === 404) {
                        addLog('', 'info');
                        addLog('🔍 ERROR 404: Endpoint no encontrado', 'error');
                        addLog('La URL del API es incorrecta', 'warning');
                        addLog('Verifica con el proveedor cuál es la URL correcta', 'warning');
                    }
                    
                    if (data.debug) {
                        addPre(data.debug, '🔍 Debug info:');
                    }
                }
                
            } catch (error) {
                addLog('', 'info');
                addLog('❌ ERROR: ' + error.message, 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    addLog('', 'info');
                    addLog('🔴 Error de conexión:', 'error');
                    addLog('1. El archivo cotizar.php no existe en el servidor', 'warning');
                    addLog('2. La URL es incorrecta', 'warning');
                    addLog('3. Problema de CORS', 'warning');
                    addLog('', 'info');
                    addLog('Verifica que el archivo esté en:', 'info');
                    addLog('https://inedito.digital/api/envios/cotizar.php', 'info');
                }
            }
        }
    </script>
</body>
</html>
